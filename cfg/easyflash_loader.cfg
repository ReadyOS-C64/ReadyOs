MEMORY {
    ZP:       file = "",  start = $0002, size = $001A, type = rw, define = yes;
    LOADER:   file = %O,  start = $0800, size = $2000, type = ro;
}

SEGMENTS {
    ZEROPAGE: load = ZP,     type = zp;
    STARTUP:  load = LOADER, type = ro;
    CODE:     load = LOADER, type = ro;
    RODATA:   load = LOADER, type = ro;
}

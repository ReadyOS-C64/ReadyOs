# Linker configuration for Ready OS Shim
# Resident kernel at $0800-$0FFF (2KB)

MEMORY {
    ZP:    file = "", start = $001C, size = $0064, type = rw, define = yes;
    SHIM:  file = %O, start = $0800, size = $0800, type = rw, fill = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP, type = zp;
    JUMPTBL:  load = SHIM, type = ro, start = $0800;
    CODE:     load = SHIM, type = ro;
    RODATA:   load = SHIM, type = ro;
    DATA:     load = SHIM, type = rw;
    BSS:      load = SHIM, type = bss, define = yes;
}

FEATURES {
    CONDES: type = constructor,
            label = __CONSTRUCTOR_TABLE__,
            count = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type = destructor,
            label = __DESTRUCTOR_TABLE__,
            count = __DESTRUCTOR_COUNT__,
            segment = RODATA;
}

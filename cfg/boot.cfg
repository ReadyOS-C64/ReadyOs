# Linker config for assembly boot loader
# Simple layout: BASIC stub + code at $0801

MEMORY {
    RAM: file = %O, start = $0801, size = $0800;
}

SEGMENTS {
    STARTUP: load = RAM, type = ro;
    CODE:    load = RAM, type = ro;
    RODATA:  load = RAM, type = ro;
    DATA:    load = RAM, type = rw;
}
